name: Dependency Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # weekly
  push:
    branches:
      - dev
      - stage
      - production

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
