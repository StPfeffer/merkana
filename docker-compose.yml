services:

  api-dev:
    container_name: ${API_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # PostgreSQL Database
      PG_NAME: ${PG_NAME}
      PG_URL: ${PG_URL}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      # Redis
      REDIS_NAME: ${REDIS_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_URL: ${REDIS_URL}
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      # Elasticsearch
      ELASTIC_HOST: ${ELASTIC_HOST}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    ports:
      - "${API_PORT}:9093"  # Spring Boot
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:${API_PORT}/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure
    networks:
      - merkana-dev-net

  api-prd:
    container_name: ${API_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prd}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # PostgreSQL Database
      PG_NAME: ${PG_NAME}
      PG_URL: ${PG_URL}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      # Redis
      REDIS_NAME: ${REDIS_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_URL: ${REDIS_URL}
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      # Elasticsearch
      ELASTIC_HOST: ${ELASTIC_HOST}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    ports:
      - "${API_PORT}:9093"  # Spring Boot
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:${API_PORT}/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure
    networks:
      - merkana-prd-net

  postgres-dev:
    container_name: ${POSTGRES_NAME}
    image: postgres:16.9
    restart: always
    env_file:
      - .env.dev
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - merkana-pg-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${PG_DB} -d ${PG_DB}'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - merkana-dev-net

  postgres-prd:
    container_name: ${POSTGRES_NAME}
    image: postgres:16.9
    restart: always
    env_file:
      - .env.prd
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - merkana-pg-prd-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${PG_DB} -d ${PG_DB}'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - merkana-prd-net

  redis-dev:
    image: redis:7-alpine
    container_name: ${REDIS_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - merkana-redis-dev-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --databases 1
    env_file:
      - .env.dev
    networks:
      - merkana-dev-net

  redis-prd:
    image: redis:7-alpine
    container_name: ${REDIS_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - merkana-redis-prd-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --databases 1
    env_file:
      - .env.prd
    networks:
      - merkana-prd-net

  elastic-dev:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
    container_name: merkana-elastic-dev
    restart: unless-stopped
    environment:
      ELASTIC_HOST: ${ELASTIC_HOST}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      network.host: 0.0.0.0
      # Cluster name for multiple nodes
      cluster.name: "merkana-cluster"
      node.name: "elastic-dev-node"
      discovery.type: single-node                # For single-node setups
      bootstrap.memory_lock: "true"             # Enable mlock
      xpack.security.enabled: "true"            # Enable security
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"             # JVM heap
    ports:
      - "${ELASTIC_HTTP_PORT}:9200"
      - "${ELASTIC_HTTPS_PORT}:9300"
    volumes:
      - merkana-elastic-dev-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - merkana-dev-net

  elastic-prd:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
    container_name: merkana-elastic-prd
    restart: unless-stopped
    environment:
      ELASTIC_HOST: ${ELASTIC_HOST}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      network.host: 0.0.0.0
      # Cluster name for multiple nodes
      cluster.name: "merkana-cluster"
      node.name: "elastic-prd-node"
      discovery.type: single-node                # For single-node setups
      bootstrap.memory_lock: "true"             # Enable mlock
      xpack.security.enabled: "true"            # Enable security
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"             # JVM heap
    ports:
      - "${ELASTIC_HTTP_PORT}:9200"
      - "${ELASTIC_HTTPS_PORT}:9300"
    volumes:
      - merkana-elastic-prd-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - merkana-prd-net

  prometheus:
    image: prom/prometheus:latest
    container_name: merkana-prometheus
    ports:
      - "9292:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    container_name: merkana-grafana
    image: grafana/grafana:latest
    networks:
      - rosnertech_network
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/docker/zabbix/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD={GRAFANA_PASSWORD}
      - GF_DATABASE_MAX_OPEN_CONN=300
      - GF_ENABLE_GZIP=true
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app,agenty-flowcharting-panel
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel

volumes:
  merkana-pg-dev-data: { }
  merkana-pg-prd-data: { }
  merkana-redis-dev-data: { }
  merkana-redis-prd-data: { }
  merkana-elastic-dev-data: { }
  merkana-elastic-prd-data: { }

networks:
  merkana-dev-net:
    driver: bridge
  merkana-prd-net:
    driver: bridge
